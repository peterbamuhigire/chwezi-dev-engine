# Routing fixtures: representative task -> the skill that should win routing.
#
# These turn "routing precision" from an assertion into a measured number. Each
# entry is a realistic task phrased the way a user would, and the slug that
# should be the strongest match. `top_n` (default 3) sets how lenient the
# assertion is: the expected skill must appear within the top_n ranked matches.
#
# Add a fixture whenever you add a skill that a neighbour could plausibly steal
# traffic from - that is exactly the collision the smoke test exists to guard.
# Run:  python -X utf8 scripts/routing_smoke_test.py
#       python -X utf8 scripts/routing_smoke_test.py --collisions   (noise report)

